version = "3.0.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "mdurl"
version = "0.1.2"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "numpy"
version = "1.26.4"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.6.4"
source = { registry = "https://pypi.org/simple" }
