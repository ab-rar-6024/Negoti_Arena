version = 1
revision = 1

[[package]]
name = "negotiarena"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn", extras = ["standard"] },
    { name = "pydantic" },
    { name = "numpy" },
    { name = "scipy" },
    { name = "httpx" },
    { name = "rich" },
    { name = "python-dotenv" },
]

[package.optional-dependencies]
training = [
    { name = "torch" },
    { name = "transformers" },
    { name = "trl" },
    { name = "datasets" },
    { name = "accelerate" },
    { name = "peft" },
    { name = "wandb" },
    { name = "huggingface-hub" },
]
demo = [
    { name = "streamlit" },
    { name = "plotly" },
    { name = "pandas" },
]
dev = [
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "black" },
    { name = "ruff" },
]

[[package]]
name = "annotated-types"
version = "0.6.0"
source = { registry = "https://pypi.org/simple" }
sdist = { url = "https://files.pythonhosted.org/packages/annotated-types-0.6.0.tar.gz" }

[[package]]
name = "anyio"
version = "4.3.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "idna" },
    { name = "sniffio" },
]

[[package]]
name = "click"
version = "8.1.7"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "fastapi"
version = "0.110.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "pydantic" },
    { name = "starlette" },
    { name = "typing-extensions" },
]

[[package]]
name = "h11"
version = "0.14.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "httpcore"
version = "1.0.4"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "certifi" },
    { name = "h11" },
]

[[package]]
name = "httpx"
version = "0.27.0"
source = { registry = "https://pypi.org/simple" }
dependencies = [
    { name = "anyio" },
    { name = "certifi" },
    { name = "httpcore" },
    { name = "idna" },
    { name = "sniffio" },
]

[[package]]
name = "idna"
version = "3.6"
source = { registry = "https://pypi.org/simple" }

[[package]]
